<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidden Potential HQ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #FAF8F4;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wrap {
      text-align: center;
      max-width: 480px;
    }

    .monogram {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border: 1.5px solid #C94B2C;
      border-radius: 50%;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #C94B2C;
      margin-bottom: 2rem;
    }

    .eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #C94B2C;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: #FAF8F4;
      line-height: 1.25;
      margin-bottom: 1.25rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #333;
      margin: 0 auto 1.25rem;
    }

    p {
      font-size: 0.9rem;
      line-height: 1.75;
      color: #999;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid #2e2e2e;
      border-radius: 100px;
      padding: 0.5rem 1.1rem;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #C94B2C;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="monogram">HQ</div>
    <p class="eyebrow">Hidden Potential HQ</p>
    <h1>Private Access Only</h1>
    <div class="divider"></div>
    <p>This platform is available by invitation only.<br>If you have credentials, please use your private access link.</p>
    <div class="badge">Restricted Access</div>
  </div>
</body>
</html>
